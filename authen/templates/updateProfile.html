{% extends 'main.html' %}
{% load static %}
{% block style %}
<link rel="stylesheet" href="{% static 'updateProfile.css' %}">
{% endblock %}
{% block content %}
<center>
    <h1 class="update-title">Update Profile</h1>
    <br>
    
    <form action="" method="post" class="update-form">
        {% csrf_token %}
        <label for="">Username </label>
        <input type="text" name="username" id="" value="{{request.user.username}}" disabled>
        <br><br>
        <label for="">First Name </label>
        <input type="text" name="fname" id="" value="{{request.user.first_name}}">
        <br><br>
        <label for="">Last Name </label>
        <input type="text" name="lname" id="" value="{{request.user.last_name}}">
        <br><br>
        <label for="">Email </label>
        <input type="email" name="email" id="" value="{{request.user.email}}">
        <br><br>
        <button type="submit">SUBMIT</button>
    </form>
</center>
{% endblock %}
